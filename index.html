<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WeatherWaypoints</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
}

header{
background:linear-gradient(90deg,#6A4C93,#4ECDC4);
padding:20px;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

header h1{
margin:0;
font-size:2em;
display:flex;
gap:10px;
align-items:center;
}

.city-input{
margin-top:10px;
display:flex;
gap:6px;
}

.city-input input{
padding:8px;
border-radius:5px;
border:none;
width:200px;
}

.city-input button{
padding:8px 14px;
border:none;
border-radius:5px;
background:#FFD93D;
cursor:pointer;
font-weight:600;
}

#map{
height:70vh;
width:100%;
}

#weatherInfo{
padding:15px;
background:#f4f4f4;
box-shadow:0 0 10px rgba(0,0,0,.2);
max-width:400px;
margin:15px auto;
border-radius:8px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<header>

<h1>
WeatherWaypoints ☁️📍
</h1>

<div class="city-input">

<input id="cityInput" placeholder="Enter city...">

<button id="fetchWeatherBtn">Check Weather</button>

</div>

</header>

<main>

<div id="map"></div>

<div id="weatherInfo" class="hidden"></div>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js" defer></script>

</body>
</html>
