<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WeatherWaypoint</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f5f7fa;
}

/* HEADER */

header{
background:linear-gradient(90deg,#3498db,#2ecc71);
padding:16px 28px;
color:white;
}

.header-container{
display:flex;
justify-content:space-between;
align-items:center;
max-width:1200px;
margin:auto;
}

/* LOGO */

.logo{
font-size:1.6em;
font-weight:600;
display:flex;
align-items:center;
gap:8px;
}

/* SEARCH */

.city-input{
display:flex;
gap:6px;
}

.city-input input{
padding:8px;
border-radius:5px;
border:none;
width:200px;
}

.city-input button{
padding:8px 14px;
border:none;
border-radius:5px;
background:#FFD93D;
cursor:pointer;
font-weight:600;
}

/* MAP */

#map{
height:70vh;
width:100%;
}

/* WEATHER CARD */

#weatherInfo{
padding:15px;
background:white;
box-shadow:0 4px 12px rgba(0,0,0,.2);
max-width:420px;
margin:20px auto;
border-radius:8px;
text-align:center;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<header>

<div class="header-container">

<div class="logo">
WeatherWaypoint ☁️📍
</div>

<div class="city-input">

<input type="text" id="cityInput" placeholder="Search city...">

<button id="fetchWeatherBtn">Check Weather</button>

</div>

</div>

</header>

<main>

<div id="map"></div>

<div id="weatherInfo" class="hidden"></div>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="script.js" defer></script>

</body>
</html>
